name: blog_app
description: "A personal blog app — read, write, and react to blogs."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.4.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Google Fonts (Inter)
  google_fonts: ^6.2.1

  # Cached image loading
  cached_network_image: ^3.3.1

  # Native share sheet
  share_plus: ^7.2.2

  # Markdown rendering for blog content
  flutter_markdown: ^0.6.22

  # Relative timestamps ("2 hours ago")
  timeago: ^3.6.1

  # Shimmer skeleton loading effect
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  image_picker: ^1.0.7
  http_parser: ^4.1.2
  mime: ^1.0.6
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.1
  liquid_pull_to_refresh: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
