name: blog_app
description: "A personal blog app — read, write, and react to blogs."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.8.0+1

  # Secure token storage
  flutter_secure_storage: ^10.3.1

  # Google Fonts (Inter)
  google_fonts: ^6.2.1

  # Cached image loading
  cached_network_image: ^3.4.1

  # Native share sheet
  share_plus: ^10.1.4

  # Markdown rendering for blog content
  flutter_markdown: ^0.7.6+2

  # Relative timestamps ("2 hours ago")
  timeago: ^3.7.0

  # Shimmer skeleton loading effect
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  image_picker: ^1.2.2
  http_parser: ^4.1.2
  mime: ^2.0.0
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
